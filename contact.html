<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Contact Luiz Paes through email, LinkedIn, or GitHub.">
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <title>Contact | Luiz Paes</title>
  <style>
    @font-face {
      font-family: "Geist";
      src: url("./assets/fonts/geist-latin-wght-normal.woff2") format("woff2");
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #131313;
      --canvas: #0e0e0e;
      --surface: #111827;
      --surface-2: #201f1f;
      --accent: #06b6d4;
      --accent-bright: #4cd7f6;
      --headline: #e5e2e1;
      --body: #bcc9cd;
      --border: #3d494c;
      --border-muted: #1f2937;
      color-scheme: dark;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--body);
      font-family: "Geist", Arial, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; }
    svg { display: block; width: 20px; height: 20px; }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      background-image: radial-gradient(rgba(6, 182, 212, 0.04) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    .topbar,
    .footer {
      background: var(--bg);
      border-color: var(--border);
      border-style: solid;
    }

    .topbar { border-width: 0 0 1px; }
    .footer { border-width: 1px 0 0; }

    .bar-inner {
      width: min(100%, 640px);
      height: 64px;
      margin: 0 auto;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent-bright);
      font-size: 18px;
      font-weight: 700;
      line-height: 1;
      text-decoration: none;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .nav a,
    .footer a {
      color: var(--body);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-decoration: none;
      text-transform: uppercase;
    }

    .footer a {
      letter-spacing: 0;
      text-transform: none;
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    .nav a:hover,
    .nav a:focus-visible,
    .footer a:hover,
    .footer a:focus-visible {
      color: var(--accent-bright);
    }

    .nav [aria-current="page"] { color: var(--accent); }

    .main {
      width: min(100%, 640px);
      margin: 0 auto;
      padding: 64px 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 32px;
    }

    .intro {
      text-align: center;
    }

    h1 {
      margin: 0;
      color: var(--headline);
      font-size: 32px;
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 12px 0 0;
      color: var(--body);
      font-size: 13px;
      line-height: 1.4;
      font-family: "Geist", monospace;
    }

    .terminal {
      background: var(--canvas);
      border: 1px solid var(--border);
    }

    .terminal-bar {
      height: 40px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--border);
      opacity: 0.55;
    }

    .term-name {
      margin-left: auto;
      color: rgba(188, 201, 205, 0.65);
      font-size: 13px;
      line-height: 1.4;
    }

    .terminal-body {
      padding: 24px;
      display: grid;
      gap: 12px;
    }

    .contact-link {
      display: grid;
      grid-template-columns: 24px 1fr auto;
      align-items: center;
      gap: 12px;
      min-height: 56px;
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--border-muted);
      border-radius: 4px;
      color: var(--body);
      text-decoration: none;
    }

    .contact-link:hover,
    .contact-link:focus-visible {
      border-color: var(--accent);
      color: var(--headline);
      outline: none;
    }

    .label {
      display: block;
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .value {
      display: block;
      margin-top: 5px;
      overflow-wrap: anywhere;
      color: var(--body);
      font-size: 13px;
      line-height: 1.4;
    }

    .arrow {
      color: var(--accent);
      font-size: 18px;
      line-height: 1;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 48px;
      margin-top: 12px;
      padding: 12px 18px;
      background: var(--accent-bright);
      border: 1px solid var(--accent-bright);
      border-radius: 4px;
      color: #003640;
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.05em;
      text-decoration: none;
      text-transform: uppercase;
    }

    .button:hover,
    .button:focus-visible {
      background: var(--accent);
      border-color: var(--accent);
      outline: 1px solid var(--accent);
      outline-offset: 3px;
    }

    .footer .bar-inner {
      height: auto;
      min-height: 72px;
      justify-content: center;
      padding-top: 18px;
      padding-bottom: 18px;
    }

    .copyright {
      color: rgba(188, 201, 205, 0.8);
      font-size: 12px;
      font-weight: 500;
    }

    @media (max-width: 640px) {
      .page { display: block; }
      .bar-inner { height: 56px; }
      .nav { display: none; }
      .main {
        min-height: auto;
        padding: 64px 16px 38px;
      }
      .intro { text-align: left; }
      h1 { font-size: 24px; }
      .terminal-body { padding: 16px; }
      .contact-link { grid-template-columns: 22px 1fr; }
      .arrow { display: none; }
      .footer .bar-inner { justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="bar-inner">
        <a class="brand" href="./" aria-label="Luiz Paes homepage">
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16v14H4z"/><path d="m7 9 3 3-3 3"/><path d="M12 15h5"/></svg>
          <span>luizpaes.dev</span>
        </a>
        <nav class="nav" aria-label="Primary navigation">
          <a href="./">Home</a>
          <a href="./contact.html" aria-current="page">Contact</a>
        </nav>
      </div>
    </header>

    <main class="main">
      <section class="intro" aria-labelledby="contact-title">
        <h1 id="contact-title">Get in Touch</h1>
        <p class="subtitle">System ready. Awaiting user input.</p>
      </section>

      <section class="terminal" aria-label="Contact options">
        <div class="terminal-bar" aria-hidden="true">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="term-name">contact.sh</span>
        </div>
        <div class="terminal-body">
          <a class="contact-link" href="mailto:hello@luizpaes.dev">
            <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="1"/><path d="m3 7 9 6 9-6"/></svg>
            <span><span class="label">Email</span><span class="value">hello@luizpaes.dev</span></span>
            <span class="arrow" aria-hidden="true">›</span>
          </a>
          <a class="contact-link" href="https://linkedin.com/in/Lfmpaes" target="_blank" rel="noopener noreferrer">
            <svg aria-hidden="true" viewBox="0 0 24 24" fill="currentColor"><path d="M20.45 20.45h-3.56v-5.57c0-1.33-.03-3.04-1.85-3.04-1.85 0-2.13 1.44-2.13 2.94v5.67H9.35V8.98h3.42v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.46v6.3ZM5.33 7.41a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12Zm1.78 13.04H3.55V8.98h3.56v11.47ZM22.23 0H1.77C.79 0 0 .77 0 1.72v20.56C0 23.23.79 24 1.77 24h20.46c.98 0 1.77-.77 1.77-1.72V1.72C24 .77 23.21 0 22.23 0Z"/></svg>
            <span><span class="label">LinkedIn</span><span class="value">linkedin.com/in/Lfmpaes</span></span>
            <span class="arrow" aria-hidden="true">›</span>
          </a>
          <a class="contact-link" href="https://github.com/Lfmpaes" target="_blank" rel="noopener noreferrer">
            <svg aria-hidden="true" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5A12 12 0 0 0 8.21 23.9c.6.11.82-.26.82-.58v-2.02c-3.34.73-4.04-1.42-4.04-1.42-.55-1.39-1.33-1.76-1.33-1.76-1.09-.75.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.5.99.11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.92 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 6 0c2.29-1.55 3.3-1.23 3.3-1.23.66 1.66.24 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.6-2.81 5.61-5.49 5.91.43.37.82 1.1.82 2.22v3.29c0 .32.22.69.83.57A12 12 0 0 0 12 .5Z"/></svg>
            <span><span class="label">GitHub</span><span class="value">github.com/Lfmpaes</span></span>
            <span class="arrow" aria-hidden="true">›</span>
          </a>
          <a class="button" href="mailto:hello@luizpaes.dev?subject=Hello%20Luiz">
            Send Email
            <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
          </a>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="bar-inner">
        <span class="copyright">© 2026 Luiz Paes</span>
      </div>
    </footer>
  </div>
</body>
</html>
